<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="../styles/login.css">
</head>

<body>

  <main>
    <div class="main-container">

      <h1>StudyFlow</h1>

      <div class="forms-container">
        <div class="forms">
          <form class="sign-in-form">
            <h2>Sign In</h2>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <a class="forgot-link" href="#">Forgot Your Password?</a>
            <button type="submit">SIGN IN</button>
          </form>

          <form class="sign-up-form">
            <h2>Sign Up</h2>
            <input type="text" placeholder="Name" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">CREATE ACCOUNT</button>
          </form>
        </div>

        <div class="overlay">
          <div class="overlay-left">
            <h2>Welcome Back!</h2>
            <p>Already have an account? Enter your details to login!</p>
            <button class="sign-in-btn" id="signInBtn">Sign In</button>
          </div>

          <div class="overlay-right">
            <h2>Hello, Friend!</h2>
            <p>Don't have an account? Consider create one!</p>
            <button class="sign-up-btn" id="signUpBtn">Sign Up</button>
          </div>

        </div>
      </div>
    </div>
        
  </main>

  <script src="../scripts/login.js"></script>
</body>

</html>
