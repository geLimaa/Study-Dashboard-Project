<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Habits</title>

  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/habits.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body>
  <main>
    <div class="main-div">

      <aside class="sidebar">

        <div class="top-content">
          <h2>StudyFlow</h2>
        </div>

        <nav class="nav-links">
          <ul class="links">
            <li><a href="./dashboard.html"><i class="bx bx-home"></i>Dashboard</a></li>
            <li><a href="./tasks.html"><i class="bx bx-task"></i>Tasks</a></li>
            <li><a href="./habits.html"><i class="bx bx-repeat"></i>Habits</a></li>
          </ul>
        </nav>

       <div class="bottom-content">
          <div class="bottom-settings">
            <a href="./settings.html"><i class="bx bx-cog"></i>Settings</a>
          </div>
          <div class="bottom-logout">
            <a href="./login.html">            <i class="bx bx-log-out"></i>Logout</a>
          </div>
        </div>

      </aside>

      <section id="dashboard-section">
        <div class="dashboard-section-container">

          <header class="dashboard-header">
            <h1>Habits</h1>
            <p>Track your daily habits</p>
          </header>

          <div class="habits-list">

            <div class="habit">
              <input type="checkbox" id="habit1">
              <label for="habit1">Drink Water</label>
            </div>

            <div class="habit">
              <input type="checkbox" id="habit2" checked>
              <label for="habit2">Study 2h</label>
            </div>

            <div class="habit">
              <input type="checkbox" id="habit3">
              <label for="habit3">Workout</label>
            </div>

            <div class="habit">
              <input type="checkbox" id="habit4">
              <label for="habit4">Read Book</label>
            </div>

          </div>

        </div>
      </section>

    </div>
  </main>
</body>

</html>
