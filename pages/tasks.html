<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Tasks</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="../styles/base.css">
  <link rel="stylesheet" href="../styles/tasks.css">
</head>

<body>
  <main>
    <div class="main-div">

      <aside class="sidebar">

        <div class="top-content">
          <h2>StudyFlow</h2>
        </div>

        <nav class="nav-links">
          <ul class="links">
            <li><a href="./dashboard.html"><i class="bx bx-home"></i>Dashboard</a></li>
            <li><a href="./tasks.html"><i class="bx bx-task"></i>Tasks</a></li>
            <li><a href="./habits.html"><i class="bx bx-repeat"></i>Habits</a></li>
          </ul>
        </nav>

        <div class="bottom-content">
          <div class="bottom-settings">
            <a href="./settings.html"><i class="bx bx-cog"></i>Settings</a>
          </div>
          <div class="bottom-logout">
            <a href="./login.html">            <i class="bx bx-log-out"></i>Logout</a>
          </div>
        </div>

      </aside>

      <section id="dashboard-section">
        <div class="dashboard-section-container">

          <header class="dashboard-header">
            <h1>Tasks</h1>
            <p>Manage your tasks</p>
          </header>

          <button class="add-task-btn">+ Add Task</button>

          <div class="tasks-list">

            <div class="task">
              <p>Study Web Development</p>
              <span class="status done">Done</span>
            </div>

            <div class="task">
              <p>Review Math Class</p>
              <span class="status pending">Pending</span>
            </div>

            <div class="task">
              <p>Send Job E-mail</p>
              <span class="status pending">Pending</span>
            </div>

          </div>

        </div>
      </section>

    </div>
  </main>
</body>

</html>
