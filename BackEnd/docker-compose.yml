services:
  postgres:
    image: postgres:16-alpine
    container_name: studyflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studyflow
      POSTGRES_PASSWORD: studyflow123
      POSTGRES_DB: studyflow
    ports:
      - "5432:5432"
    volumes:
      - studyflow_postgres_data:/var/lib/postgresql/data

volumes:
  studyflow_postgres_data:
